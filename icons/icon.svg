
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34a853;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#grad)"/>
  
  <!-- Video frame -->
  <rect x="20" y="30" width="60" height="45" rx="4" fill="white" opacity="0.9"/>
  
  <!-- Play button -->
  <polygon points="40,45 40,60 55,52.5" fill="#4285f4"/>
  
  <!-- PiP window -->
  <rect x="70" y="60" width="35" height="25" rx="3" fill="white" opacity="0.8"/>
  <rect x="75" y="65" width="25" height="15" rx="2" fill="#4285f4"/>
  
  <!-- Text -->
  <text x="64" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">PiP</text>
</svg>
